# ─── 大模型配置文件 ───
# 支持多模型服务节点，每个节点可定义多个模型

# 默认模型服务
default:
  base_url: "https://xxx/v1"
  api_key: "xx"
  timeout_connect: 60
  timeout_read: 600
  timeout_total: 660
  ssl_verify: true
  think_tag_mode: ""  # qwen3 / r1 / none
  proxy: ""



# 模型定义
models:
  qwen3.5-27b:
    provider: "default"
    model: "qwen3.5-27b"
    temperature: 0.6
    top_p: 0.95
    max_tokens: 32768
    stream: true
    max_retry: 3

# 场景化配置
scenarios:
  planner:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768
    response_format: "json"
    extra_payload:
      enable_thinking: true

  reflector:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768
    response_format: "json"
    extra_payload:
      enable_thinking: false

  anchor_select:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768
    response_format: "json"
    extra_payload:
      enable_thinking: false

  skill_factory_json:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768
    response_format: "json"
    extra_payload:
      enable_thinking: false

  skill_factory_outline:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768
    response_format: "json"
    extra_payload:
      enable_thinking: true

  report_writer:
    model: "qwen3.5-27b"
    temperature: 0.6
    max_tokens: 32768

  react_agent:
    model: "qwen3.5-27b"
    temperature: 0.7
    top_p: 0.95
    max_tokens: 32768
    extra_payload:
      enable_thinking: false
